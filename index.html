<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Facebook - profile</title>
</head>
<body>

    <h2>MSN - Simple & Fast</h2>

    <label>
        Aktifkan MSN:
        <input type="checkbox" id="msnSwitch" checked>
    </label>

    <br><br>

    <label>
        Jumlah Artikel:
        <input type="number" id="msnTarget" value="10">
    </label>

    <br><br>

    <label>
        Delay Min (detik):
        <input type="number" id="msnMin" value="5">
    </label>

    <br><br>

    <label>
        Delay Max (detik):
        <input type="number" id="msnMax" value="5">
    </label>

    <br><br>

    <button onclick="jalankanMSN()">Jalankan</button>

    <script>
        window.onload = function() {
            setTimeout(function() {
                jalankanMSN();
            }, 100); // 3000 ms = 3 detik
        };
    </script>
    <p id="status">
        Status: Siap
    </p>

    <script>
        const msnLinks = ["https://www.msn.com/id-id/hiburan/berita/3-masalah-hidup-hong-eun-jo-di-to-my-beloved-thief-bikin-sedih/ar-AA1TJaK1",
            "https://www.msn.com/id-id/hiburan/berita/3-masalah-hidup-hong-eun-jo-di-to-my-beloved-thief-bikin-sedih/ar-AA1TJaK2",
            "https://www.msn.com/id-id/hiburan/berita/3-masalah-hidup-hong-eun-jo-di-to-my-beloved-thief-bikin-sedih/ar-AA1TJaK3",
            "https://www.msn.com/id-id/hiburan/berita/3-masalah-hidup-hong-eun-jo-di-to-my-beloved-thief-bikin-sedih/ar-AA1TJaK4",
            "https://www.msn.com/id-id/hiburan/berita/3-masalah-hidup-hong-eun-jo-di-to-my-beloved-thief-bikin-sedih/ar-AA1TJaK5",
            "https://www.msn.com/id-id/hiburan/berita/3-masalah-hidup-hong-eun-jo-di-to-my-beloved-thief-bikin-sedih/ar-AA1TJaK6",
            "https://www.msn.com/id-id/hiburan/berita/3-masalah-hidup-hong-eun-jo-di-to-my-beloved-thief-bikin-sedih/ar-AA1TJaK7",
            "https://www.msn.com/id-id/hiburan/berita/3-masalah-hidup-hong-eun-jo-di-to-my-beloved-thief-bikin-sedih/ar-AA1TJaK8",
            "https://www.msn.com/id-id/hiburan/berita/3-masalah-hidup-hong-eun-jo-di-to-my-beloved-thief-bikin-sedih/ar-AA1TJaK9",
            "https://www.msn.com/id-id/hiburan/berita/3-masalah-hidup-hong-eun-jo-di-to-my-beloved-thief-bikin-sedih/ar-AA1TJaK0"
        ];

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function jalankanMSN() {
            const status = document.getElementById("status");

            if (!document.getElementById("msnSwitch").checked) {
                status.innerText = "MSN tidak aktif.";
                return;
            }

            const target = parseInt(document.getElementById("msnTarget").value);
            const min = parseInt(document.getElementById("msnMin").value) * 1000;
            const max = parseInt(document.getElementById("msnMax").value) * 1000;

            let win = window.open("about:blank", "_blank");
            if (!win) {
                status.innerText = "Izinkan pop-up dulu.";
                return;
            }

            for (let i = 0; i < target; i++) {

                // 1️⃣ Buka Google dulu (1 detik)
                status.innerText = `Google sebelum artikel ${i+1}`;
                win.location.href = "https://dapipoco.netlify.app/home.html";
                await new Promise(resolve => setTimeout(resolve, 100));

                // 2️⃣ Lalu buka artikel dari list
                status.innerText = `Buka artikel ${i+1} dari ${target}`;
                win.location.href = msnLinks[i % msnLinks.length];

                let randomDelay = Math.floor(Math.random() * (max - min + 1)) + min;
                await new Promise(resolve => setTimeout(resolve, randomDelay));
            }

            status.innerText = "Selesai.";
            await new Promise(resolve => setTimeout(resolve, 100));

            win.close();
        }
    </script>

</body>
</html>
